  - id: reconcile
    prompt: |
      You have three independent PII audit reports of the same repository. Reconcile them.
      
      1. List ALL findings classified as CRITICAL by ANY reviewer — these must be resolved before publishing.
      2. List all WARNING findings flagged by 2+ reviewers.
      3. If all three say SAFE TO PUBLISH, confirm it.
      4. If ANY says NOT SAFE, list exactly what must be fixed.
      
      Be conservative. One reviewer finding a real PII issue is enough to block publication.
      
      Output: SAFE TO PUBLISH or NOT SAFE with the exact fixes needed.
    provider: openai
    model: gpt-5.2
    depends_on: [audit-gpt, audit-grok, audit-gemini]
    output_file: RECONCILED-PII-AUDIT.md

merge_prompt: |
  One line: SAFE or NOT SAFE. If not safe, list the files and issues in 5 words each.
merge_provider: openai
merge_model: gpt-5.2
