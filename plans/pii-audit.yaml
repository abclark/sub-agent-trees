      3. **Phone numbers** — any format
      4. **Physical addresses** — street, city, zip
      5. **Financial data** — account numbers, balances, specific dollar amounts that could identify someone, SSNs, EINs, tax IDs
      6. **API keys, tokens, secrets** — anything that looks like a credential
      7. **Employer names** — specific company names tied to a real person's employment
      8. **Dates tied to individuals** — birthdates, hire dates, specific transaction dates
      9. **Device identifiers** — MAC addresses, serial numbers, device names
